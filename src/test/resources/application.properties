%test.quarkus.test.flat-class-path=true
%test.quarkus.log.category."io.debezium".level=INFO
%test.quarkus.log.category."io.quarkus.arc".level=ERROR
%test.quarkus.log.category."io.quarkus.deployment".level=ERROR
%test.quarkus.log.category."io.quarkus.runner.bootstrap".level=FATAL
%test.quarkus.log.category."io.debezium.connector.postgresql".level=ERROR

%test.debezium.avro=BINARY

# TODO: remove these configs
%test.output.avro.naming-strategy.partitioner=UNPARTITIONED
%test.output.avro.naming-strategy.file-name=PROCESSING_TIME
%test.output.parquet.naming-strategy.partitioner=UNPARTITIONED
%test.output.parquet.naming-strategy.file-name=PROCESSING_TIME
%test.output.orc.naming-strategy.partitioner=UNPARTITIONED
%test.output.orc.naming-strategy.file-name=PROCESSING_TIME

%test.output.iceberg.properties.type=jdbc
%test.output.iceberg.properties.uri=jdbc:postgresql://localhost:5432/postgres
%test.output.iceberg.properties.jdbc.user=postgres
%test.output.iceberg.properties.jdbc.password=postgres
%test.output.iceberg.properties.jdbc.schema-version=V1

%test.output.paimon.properties.type=jdbc
%test.output.paimon.properties.warehouse=s3a://warehouse/paimon-warehouse
%test.output.paimon.properties.jdbc-url=jdbc:postgresql://localhost:5432/postgres
%test.output.paimon.properties.jdbc-user=postgres
%test.output.paimon.properties.jdbc-password=postgres
%test.output.paimon.properties.jdbc-driver=org.postgresql.Driver
%test.output.paimon.properties.jdbc-table-prefix=paimon_
%test.output.paimon.file-io.properties.fs.s3a.access.key=admin
%test.output.paimon.file-io.properties.fs.s3a.secret.key=password
%test.output.paimon.file-io.properties.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
%test.output.paimon.file-io.properties.fs.s3a.path.style.access=true
%test.output.paimon.file-io.properties.fs.s3a.endpoint=http://localhost:9000
