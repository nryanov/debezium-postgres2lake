# Hive Metastore (Thrift) + dedicated Postgres backend. Paths relative to examples/common/.
services:
  postgres-hms:
    image: postgres:17
    hostname: postgres-hms
    environment:
      POSTGRES_DB: metastore_db
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore_db"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 15s
    volumes:
      - postgres_hms_data:/var/lib/postgresql/data

  hive-metastore:
    image: apache/hive:4.0.1
    hostname: hive-metastore
    depends_on:
      postgres-hms:
        condition: service_healthy
      mc:
        condition: service_started
      minio:
        condition: service_started
    ports:
      - "9083:9083"
    environment:
      DB_DRIVER: postgres
      SERVICE_NAME: metastore
      HIVE_WAREHOUSE_PATH: s3a://warehouse/hive-warehouse
      DEFAULT_FS: s3a://warehouse
      S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
      SERVICE_OPTS: >-
        -Xmx1G
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres-hms:5432/metastore_db
        -Djavax.jdo.option.ConnectionUserName=hive
        -Djavax.jdo.option.ConnectionPassword=hive
    volumes:
      - ./ext-jars/postgresql-42.7.4.jar:/opt/hive/lib/postgresql-42.7.4.jar:ro
      - ./ext-jars/hadoop-aws-3.3.6.jar:/opt/hive/lib/hadoop-aws-3.3.6.jar:ro
      - ./ext-jars/aws-java-sdk-bundle-1.12.367.jar:/opt/hive/lib/aws-java-sdk-bundle-1.12.367.jar:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/9083'"]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 180s

volumes:
  postgres_hms_data:
