quarkus.http.port=9090
quarkus.log.console.json.enabled=false

debezium.engine.name=examples
debezium.engine.database.hostname=postgres
debezium.engine.database.dbname=postgres
debezium.engine.database.port=5432
debezium.engine.database.user=postgres
debezium.engine.database.password=postgres
debezium.engine.publication.name=debezium
debezium.engine.slot.name=debezium
debezium.engine.plugin.name=pgoutput
debezium.engine.snapshot.mode=NO_DATA
debezium.engine.topic.prefix=default
debezium.engine.offset.storage=org.apache.kafka.connect.storage.MemoryOffsetBackingStore

debezium.avro.format=CONFLUENT
debezium.avro.properties.schema.registry.url=http://schema-registry:8080/apis/ccompat/v7

debezium.output.avro.threshold.records=10
debezium.output.avro.threshold.time=5m
debezium.output.avro.naming-strategy.partitioner=UNPARTITIONED
debezium.output.avro.naming-strategy.file-name=PROCESSING_TIME
debezium.output.avro.naming-strategy.storage=S3
debezium.output.avro.naming-strategy.target-path=warehouse
# HDFS example:
# debezium.output.avro.naming-strategy.storage=HDFS
# debezium.output.avro.naming-strategy.target-path=/warehouse

debezium.output.avro.file-io.properties.fs.s3a.access.key=admin
debezium.output.avro.file-io.properties.fs.s3a.secret.key=password
debezium.output.avro.file-io.properties.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
debezium.output.avro.file-io.properties.fs.s3a.path.style.access=true
debezium.output.avro.file-io.properties.fs.s3a.endpoint=http://minio:9000

# SPI provider is discovered from external JAR mounted at /work/spi.
debezium.extensions.readiness-marker-event-emitter.name=io.debezium.postgres2lake.extensions.readiness.marker.event.emitter.s3.S3ReadinessMarkerEventEmitterProvider
debezium.extensions.readiness-marker-event-emitter.properties.bucket=warehouse
debezium.extensions.readiness-marker-event-emitter.properties.marker-key-prefix=readiness-markers
debezium.extensions.readiness-marker-event-emitter.properties.region=us-east-1
debezium.extensions.readiness-marker-event-emitter.properties.endpoint=http://minio:9000
debezium.extensions.readiness-marker-event-emitter.properties.access-key-id=admin
debezium.extensions.readiness-marker-event-emitter.properties.secret-access-key=password
debezium.extensions.readiness-marker-event-emitter.properties.path-style-access=true
