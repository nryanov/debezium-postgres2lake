####### FOR SPI #######
quarkus.package.jar.type=legacy-jar
####### QUARKUS DOCKER (JIB) SHARED CONFIG #######
quarkus.container-image.group=local
quarkus.container-image.tag=latest
quarkus.container-image.build=false
quarkus.container-image.push=false

quarkus.jib.ports=9090

default.jvm.opts=-Xms1024m -Xmx2048m
jvm.opts=${JVM_OPTS:${default.jvm.opts}}
quarkus.jib.environment-variables."JVM_OPTS"=${jvm.opts}
quarkus.jib.environment-variables."APP_MAIN_CLASS"=${app.main.class:}
quarkus.jib.jvm-entrypoint=/bin/sh,/work/docker-entrypoint.sh
