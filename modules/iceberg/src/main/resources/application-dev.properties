debezium.engine.name=development
debezium.engine.database.hostname=localhost
debezium.engine.database.dbname=postgres
debezium.engine.database.port=5432
debezium.engine.database.user=postgres
debezium.engine.database.password=postgres
debezium.engine.publication.name=debezium
debezium.engine.slot.name=debezium
debezium.engine.plugin.name=pgoutput
debezium.engine.snapshot.mode=NO_DATA
debezium.engine.topic.prefix=default
debezium.engine.offset.storage=org.apache.kafka.connect.storage.MemoryOffsetBackingStore

debezium.avro.format=CONFLUENT

debezium.avro.properties.schema.registry.url=http://localhost:8080/apis/ccompat/v7

output.format=ICEBERG
output.threshold.records=10
output.threshold.time=5m

output.iceberg.name=development
output.iceberg.properties.type=jdbc
output.iceberg.properties.uri=jdbc:postgresql://localhost:5432/postgres
output.iceberg.properties.jdbc.user=postgres
output.iceberg.properties.jdbc.password=postgres
output.iceberg.properties.jdbc.schema-version=V1
output.iceberg.properties.io-impl=org.apache.iceberg.aws.s3.S3FileIO
output.iceberg.properties.warehouse=s3a://warehouse
output.iceberg.properties.s3.endpoint=http://localhost:9000
output.iceberg.properties.s3.access-key-id=admin
output.iceberg.properties.s3.secret-access-key=password
output.iceberg.properties.s3.path-style-access=true
output.iceberg.properties.s3.client-factory-impl=io.debezium.postgres2lake.infrastructure.format.iceberg.InstrumentedS3FileIOAwsClientFactory
